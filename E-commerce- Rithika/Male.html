<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opal Fashion Store - Male Collection</title>
    <script src="https://kit.fontawesome.com/0c41ca4a6c.js" crossorigin="anonymous"></script>
    <!-- Loaded jsPDF external library script directly -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Female.css">
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .form-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            box-sizing: border-box;
        }

        .form-container h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group textarea {
            resize: vertical;
            height: 80px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .submit-btn {
            background-color: #111;
            color: white;
            border: none;
            padding: 12px;
            cursor: pointer;
            flex: 1;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .submit-btn:hover {
            background-color: #444;
        }

        .cancel-btn {
            background-color: #e0e0e0;
            color: #333;
            border: none;
            padding: 12px;
            cursor: pointer;
            flex: 1;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .cancel-btn:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <h1 id="logo">Opal</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="Home.html"><i class="fa-solid fa-house"></i>Home</a></li>
                <li><a href="about.html">About</a></li>
                <li class="dropdown">
                    <a href="Categories.html" class="dropbtn">Categories ▾</a>
                    <ul class="dropdown-content">
                        <li><a href="Female.html"><i class="fa-solid fa-person-dress"></i> FEMALE</a></li>
                        <li><a href="Male.html"><i class="fa-solid fa-person"></i> MALE</a></li>
                    </ul>
                </li>
                <li><a href="Contact.html"><i class="fa-solid fa-phone"></i>Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="collection-section">
        <h1><i class="fa-solid fa-person"></i> Male Collection</h1>
        <div class="collection-container">
            <div class="product-card">
                <img src="man1.jpg" alt="Classic Linen Shirt">
                <h2>Classic Linen Shirt</h2>
                <p>₹1,499</p>
                <button onclick="addToCart('Classic Linen Shirt', 1499)">Add To Cart</button>
            </div>
            <div class="product-card">
                <img src="man2.jpg" alt="Slim Fit Blazer">
                <h2>Slim Fit Blazer</h2>
                <p>₹4,500</p>
                <button onclick="addToCart('Slim Fit Blazer', 4500)">Add To Cart</button>
            </div>
            <div class="product-card">
                <img src="man3.jpg" alt="Traditional Kurta">
                <h2>Traditional Kurta</h2>
                <p>₹1,799</p>
                <button onclick="addToCart('Traditional Kurta', 1799)">Add To Cart</button>
            </div>
            <div class="product-card">
                <img src="man4.jpg" alt="Denim Jacket">
                <h2>Denim Jacket</h2>
                <p>₹2,200</p>
                <button onclick="addToCart('Denim Jacket', 2200)">Add To Cart</button>
            </div>
        </div>
    </section>

    <section class="cart-section">
        <h1><i class="fa-solid fa-cart-shopping"></i> Your Cart</h1>
        <ul id="cartItems"></ul>
        <button class="place-order-btn" onclick="placeOrder()">Place Order</button>
    </section>

    <div class="modal-overlay" id="orderModal">
        <div class="form-container">
            <h2>Checkout Details</h2>
            <form id="checkoutForm" onsubmit="submitOrder(event)">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" required placeholder="Enter 10-digit number" pattern="[0-9]{10}">
                </div>
                <div class="form-group">
                    <label for="address">Delivery Address</label>
                    <textarea id="address" required placeholder="Enter your complete address"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="closeForm()">Cancel</button>
                    <button type="submit" class="submit-btn">Confirm Order</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentCartData = [];

        function addToCart(itemName, itemPrice){
            currentCartData.push({ name: itemName, price: itemPrice });
            
            let li = document.createElement("li");
            li.innerText = itemName + " - ₹" + itemPrice;
            document.getElementById("cartItems").appendChild(li);
            
            alert(itemName + " Added To Cart");
        }

        function placeOrder(){
            if(currentCartData.length === 0){
                alert("Your Cart Is Empty");
            } else {
                document.getElementById("orderModal").style.display = "flex";
            }
        }

        function closeForm(){
            document.getElementById("checkoutForm").reset();
            document.getElementById("orderModal").style.display = "none";
        }

        function submitOrder(event){
            event.preventDefault();
            
            let name = document.getElementById("fullName").value;
            let phone = document.getElementById("phoneNumber").value;
            let address = document.getElementById("address").value;
            
            if(name == "" || phone == "" || address == ""){
                alert("Fill all details first");
                return false;
            }

            const { jsPDF } = window.jspdf;
            let doc = new jsPDF();
            
            let orderId = Math.floor(100000 + Math.random());
            let dateString = new Date().toLocaleString();

            doc.setFontSize(22);
            doc.text("Opal Fashion Store", 20, 20);
            
            doc.setFontSize(12);
            doc.text("Invoice Receipt", 20, 28);
            doc.text("Order ID: #" + orderId, 20, 38);
            doc.text("Date: " + dateString, 20, 45);
            
            doc.line(20, 52, 190, 52); 

            doc.setFontSize(14);
            doc.text("Customer Details", 20, 62);
            doc.setFontSize(12);
            doc.text("Name: " + name, 20, 72);
            doc.text("Phone: " + phone, 20, 80);
            doc.text("Address: " + address, 20, 88);
            
            doc.line(20, 96, 190, 96);

            doc.setFontSize(14);
            doc.text("Items Ordered", 20, 106);
            doc.setFontSize(12);
            
            let yPosition = 116;
            let totalBill = 0;
            
            currentCartData.forEach(function(item) {
                totalBill += item.price;
                doc.text(item.name, 20, yPosition);
                doc.text("Rs. " + item.price, 150, yPosition);
                yPosition += 10;
            });
            
            doc.line(20, yPosition, 190, yPosition);
            yPosition += 12;
            
            doc.setFontSize(14);
            doc.text("Total Amount Paid:", 20, yPosition);
            doc.text("Rs. " + totalBill, 150, yPosition);

            alert("Thank you " + name + "! Downloading your invoice copy...");
            doc.save("Opal_Order_" + orderId + ".pdf");
            
            closeForm();
            document.getElementById("cartItems").innerHTML = "";
            currentCartData = [];
        }
    </script>
</body>
</html>

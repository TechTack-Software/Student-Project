<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://kit.fontawesome.com/0c41ca4a6c.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport"
     content="width=device-width, initial-scale=1.0">

    <title>Contact Us</title>

    <link rel="stylesheet" href="contact.css">

</head>

<body>

<nav>

    <h2><i class="fa-solid fa-kitchen-set"></i> Foodie Hub</h2>

    <ul>
            <li><a href="projet2.html">Home <i class="fa-solid fa-house"></i> </a></li>
            <li><a href="About.html">About <i class="fa-solid fa-store"></i></a></li>
            <li><a href="order.html">Order <i class="fa-solid fa-box-open"></i></a></li>
            <li><a href="menu.html">menu <i class="fa-solid fa-bowl-food"></i></a></li>
            <li><a href="contact.html">Contact <i class="fa-solid fa-circle-user"></i></a></li>
        </ul>
</nav>


<h1 class="contact-title">
    Contact Us
</h1>


<div class="contact-container">


    <div class="contact-info">

        <h2>
            <i class="fa-solid fa-user"></i>
            Get In Touch
        </h2>

        <p>
            We'd love to hear from you.
            Send us a message and we'll
            respond as soon as possible.
        </p>

        <hr>


        <div class="info-box">

            <h3>
                <i class="fa-solid fa-location-dot"></i>
                Address
            </h3>

            <p>
                123 Food Street, Chennai
            </p>

        </div>


        <div class="info-box">

            <h3>
                <i class="fa-solid fa-phone"></i>
                Phone
            </h3>

            <p>
                +91 9876543210
            </p>

        </div>


        <div class="info-box">

            <h3>
                <i class="fa-solid fa-envelope"></i>
                Email
            </h3>

            <p>
                foodiehub@gmail.com
            </p>

        </div>
        <div class="map-box">

    <iframe
        src="https://www.google.com/maps?q=Chennai&output=embed"
        width="100%"
        height="250"
        style="border:0;"
        allowfullscreen=""
        loading="lazy">
    </iframe>

</div>


    </div>


    <div class="contact-form">


        <div class="input-box">

            <i class="fa-solid fa-user"></i>

            <input type="text" id="name"
             placeholder="Your Name">

        </div>


        <div class="input-box">

            <i class="fa-solid fa-envelope"></i>

            <input type="email" id="email"
             placeholder="Your Email">

        </div>


        <div class="input-box">

            <i class="fa-solid fa-phone"></i>

            <input type="tel" id="phone" placeholder="your phone">

        </div>


        <div class="input-box textarea-box">

            <i class="fa-solid fa-pen"></i>

            <textarea id="message"
             placeholder="Your Message">
            </textarea>

        </div>


        <button type="button" onclick="sendMessage()">
            Send Message
        </button>
    </div>
    
</div>
<div class="card-image">

    <img src="visitingcard.jpeg">

</div>
<script>

function sendMessage(){

    let name =
    document.getElementById("name").value;

    let email =
    document.getElementById("email").value;

    let phone =
    document.getElementById("phone").value;

    let message =
    document.getElementById("message").value;

    if(
        name === "" ||
        email === "" ||
        phone === "" ||
        message === ""
    ){

        alert(
            "⚠ Please fill all the boxes!"
        );
    }

    else{

        alert(
            "Message Sent Successfully!"
        );
    }
}

</script>

</body>
</html>

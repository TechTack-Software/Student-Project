<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video to QR</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:40px;

    background-image: url("C:/Users/ELCOT/Downloads/Gemini_Generated_Image_kk1r1tkk1r1tkk1r.png");
    background-size:cover;
    background-position:center;
}

/* Back to home */

.home{
    position:absolute;
    top:20px;
    right:30px;
    text-decoration:none;
    color:rgb(255, 255, 255);
    font-size:22px;
    font-weight:bold;
}

/* Main heading */

h1{
    text-align:center;
    color:#1262ff;
    margin-bottom:30px;
}

/* White box */

.box{
    width:75%;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

/* Instructions */

h2{
    color:#1262ff;
    margin-bottom:20px;
}

ol li{
    font-size:22px;
    margin:25px 0;
}
button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    background:#02004b;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#008cdd;
}


</style>
</head>

<body>

<a href="home page.html" class="home">Back to Home</a>

<br><br>
<div class="box">

    <h2>Instructions</h2>

    <ol>
        <li>Convert your video into URL (Use Google Drive)</li>
        <li>Copy that URL</li>
        <li>Paste the URL in textbox</li>
        <li>Click and generate QR</li>
        <li>Download the QR code image</li>
    </ol>
    <button onclick="window.location.href= 'v2QR.html'">Start</button>

</div>

</body>
</html>

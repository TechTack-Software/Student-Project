<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/5afc157f9b.js" crossorigin="anonymous"></script>

    <title>Document</title>

    <link rel="stylesheet" href="appointment.css">
</head>

<body>

    <nav>

        <div class="logo">

            <i class="fa-solid fa-hospital"></i>

            <h2>MediCare Hospital</h2>

        </div>

        <div class="menu">

            <a href="home.html"><i class="fa-solid fa-house"></i>Home</a>

            <a href="about.html"><i class="fa-solid fa-info"></i>About</a>

            <a href="doctors.html"><i class="fa-solid fa-user-doctor"></i>Doctors</a>

            <a href="appointment.html"><i class="fa-solid fa-calendar-check"></i>Appointment</a>

        </div>

    </nav>

    <!-- Appointment Form -->

    <section class="appointment-container">

        <!-- Form -->

        <div class="form-box">

            <h1>Book Appointment</h1>

            <form action="confirmation.html">

                <input type="text"
                id="patientName"
                placeholder="Patient Name"
                required>

                <input type="number"
                placeholder="Age"
                required>

                <input type="text"
                placeholder="Height (cm)"
                min="1"
                required>

                <input type="text"
                placeholder="Weight (kg)"
                min="1"
                required>

                <select required>

                    <option>Select Gender</option>

                    <option>Male</option>

                    <option>Female</option>

                    <option>Other</option>

                </select>

                <input type="tel"
                placeholder="Phone Number"
                pattern="[0-9]{10}"
                maxlength="10"
                required>

                <!-- Doctor Select -->

                <select id="doctor"
                onchange="changeDoctor()"
                required>

                    <option value="">
                        Select Doctor
                    </option>

                    <option value="doctor1">
                        Dr. Priya Sharma
                    </option>

                    <option value="doctor2">
                        Dr. Arjun Kumar
                    </option>

                    <option value="doctor3">
                        Dr. Meena Ravi
                    </option>

                    <option value="doctor4">
                        Dr. Kavin Raj
                    </option>

                    <option value="doctor5">
                        Dr. Anitha Devi
                    </option>

                    <option value="doctor6">
                        Dr. Rahul Singh
                    </option>

                    <option value="doctor7">
                        Dr. Sneha Patel
                    </option>

                    <option value="doctor8">
                        Dr. Vignesh Kumar
                    </option>

                    <option value="doctor9">
                        Dr. Deepa Nair
                    </option>

                    <option value="doctor10">
                        Dr. Surya Prakash
                    </option>

                </select>

                <input type="date"
                id="appointmentDate"
                required>

                <!-- Time Slot -->

                <select id="timeSlot" required>

                    <option value="">
                        Select Time Slot
                    </option>

                    <option>10:00 AM</option>
                    <option>10:30 AM</option>

                    <option>11:00 AM</option>
                    <option>11:30 AM</option>

                    <option>12:00 PM</option>
                    <option>12:30 PM</option>

                    <option>1:00 PM</option>
                    <option>1:30 PM</option>

                    <option>2:00 PM</option>
                    <option>2:30 PM</option>

                    <option>3:00 PM</option>
                    <option>3:30 PM</option>

                    <option>4:00 PM</option>
                    <option>4:30 PM</option>

                    <option>5:00 PM</option>
                    <option>5:30 PM</option>

                    <option>6:00 PM</option>
                    <option>6:30 PM</option>

                    <option>7:00 PM</option>
                    <option>7:30 PM</option>

                    <option>8:00 PM</option>
                    <option>8:30 PM</option>

                    <option>9:00 PM</option>

                </select>

                <textarea
                placeholder="Symptoms / Problem">
                </textarea>

                <button type="submit"
                onclick="return checkBooking(event)">

                    Confirm Appointment

                </button>

            </form>

        </div>

        <!-- Doctor Details -->

        <div class="doctor-details">

            <h1>Doctor Details</h1>

            <img id="doctorImage"
            src="doctor1.jpg"
            alt="Doctor">

            <h2 id="doctorName">
                Dr. Priya Sharma
            </h2>

            <h3 id="doctorSpecialist">
                Cardiologist
            </h3>

        </div>

    </section>

    <!-- JavaScript -->

<script>

function changeDoctor(){

    let doctor =
    document.getElementById("doctor").value;

    let image =
    document.getElementById("doctorImage");

    let name =
    document.getElementById("doctorName");

    let specialist =
    document.getElementById("doctorSpecialist");

    if(doctor == "doctor1"){

        image.src = "doctor1.jpg";

        name.innerHTML =
        "Dr. Priya Sharma";

        specialist.innerHTML =
        "Cardiologist";
    }

    else if(doctor == "doctor2"){

        image.src = "doctor2.jpg";

        name.innerHTML =
        "Dr. Arjun Kumar";

        specialist.innerHTML =
        "Dentist";
    }

    else if(doctor == "doctor3"){

        image.src = "doctor3.jpg";

        name.innerHTML =
        "Dr. Meena Ravi";

        specialist.innerHTML =
        "Neurologist";
    }

    else if(doctor == "doctor4"){

        image.src = "doctor4.jpg";

        name.innerHTML =
        "Dr. Kavin Raj";

        specialist.innerHTML =
        "Orthopedic";
    }

    else if(doctor == "doctor5"){

        image.src = "doctor5.jpg";

        name.innerHTML =
        "Dr. Anitha Devi";

        specialist.innerHTML =
        "Pediatrician";
    }

    else if(doctor == "doctor6"){

        image.src = "doctor6.jpg";

        name.innerHTML =
        "Dr. Rahul Singh";

        specialist.innerHTML =
        "Dermatologist";
    }

    else if(doctor == "doctor7"){

        image.src = "doctor7.jpg";

        name.innerHTML =
        "Dr. Sneha Patel";

        specialist.innerHTML =
        "Gynecologist";
    }

    else if(doctor == "doctor8"){

        image.src = "doctor8.jpg";

        name.innerHTML =
        "Dr. Vignesh Kumar";

        specialist.innerHTML =
        "ENT Specialist";
    }

    else if(doctor == "doctor9"){

        image.src = "doctor9.jpg";

        name.innerHTML =
        "Dr. Deepa Nair";

        specialist.innerHTML =
        "Ophthalmologist";
    }

    else if(doctor == "doctor10"){

        image.src = "doctor10.jpg";

        name.innerHTML =
        "Dr. Surya Prakash";

        specialist.innerHTML =
        "General Physician";
    }
}

function checkBooking(event){

    let doctor =
    document.getElementById("doctor").value;

    let date =
    document.getElementById("appointmentDate").value;

    let time =
    document.getElementById("timeSlot").value;

    if(doctor == "" || date == "" || time == ""){

        alert("Please fill all required fields!");

        event.preventDefault();

        return false;
    }

    let booking =
    doctor + date + time;

    if(localStorage.getItem(booking)){

        alert("This doctor is already booked at this time!");

        event.preventDefault();

        return false;
    }

    else{

        localStorage.setItem(booking, "booked");

        let patientData = {

            name:
            document.getElementById("patientName").value,

            doctor:
            document.getElementById("doctorName").innerHTML,

            specialist:
            document.getElementById("doctorSpecialist").innerHTML,

            date: date,

            time: time
        };

        localStorage.setItem(
            "appointmentData",
            JSON.stringify(patientData)
        );

        alert("Appointment Booked Successfully!");

        return true;
    }
}

</script>

<!-- Footer -->

<footer>

    <div class="footer-box">

        <i class="fa-solid fa-phone"></i>

        <p>+91 9876543210</p>

    </div>

    <div class="footer-box">

        <i class="fa-solid fa-envelope"></i>

        <p>medicare@gmail.com</p>

    </div>

    <div class="footer-box">

        <i class="fa-solid fa-map-marker-alt"></i>

        <a href="https://www.google.com/maps?q=Chennai"
        target="_blank">

            Chennai

        </a>

    </div>

</footer>

</body>
</html>
